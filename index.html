<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MÚSICA</title>
    <link rel="stylesheet" href="style/scaperoom.css">
    <script src="js/scaperoom.js" defer></script>
</head>

<body>
    <main class="principal" id="principal">

        <div class="jugar" id="jugar" onclick="escena0()"></div>
        
        <!--Escena Ciudad Silencio -- onclick final de la callle Umbral Murmullo-->
        <div class="ciudadSilencio" id="ciudadSilencio"></div>

        <!--Escena Umbral murmullo -- onclick puerta puzzle metrónomos-->
        <div class="umbral" id="umbral"></div>
        <div class="metronomo1" id="metronomo1"></div>
        <div class="metronomo2" id="metronomo2"></div>
        <div class="metronomo3" id="metronomo3"></div> <!--Si se pulsa este se va a la escena 3-->
        <div class="aguja1" id="aguja1"></div>
        <div class="aguja2" id="aguja2"></div>
        <div class="aguja3" id="aguja3"></div> <!--Si se pulsa este se va a la escena 3-->
        <button class="reproducirMetronomo" id="reproducirMetronomo">¿Necesitas volver a escuchar el ritmo?</button>

        <!--Escena Teatro Vacío -- si se pulsa en el orden correcto Teatro Alegría-->
        <div class="teatro" id="teatro">
            <button class="btn0" id="btn0"></button>
            <button class="btn1" id="btn1"></button>
            <button class="btn2" id="btn2"></button>
            <button class="btn3" id="btn3"></button>
            <div class="pistaNotas" id="pistaNotas"></div>
        </div>

        <!--Escena Teatro Alegría -- si se pulsa en el telón Archivo de las Canciones Olvidadas-->
        <div class="telon" id="telon" onclick="escena5()"></div>

        <!--Escena Archivo Canciones Olvidadas -- si se introduce la palabra correcta Archivo Sonoro-->
        <div class="flecha" id="flecha" onclick="escena502()"></div>
        <!--Flecha para volver a la escena cuando se está en algún div de libro-->
        <div class="libro1" id="libro1" onclick="mostrarLibro1()"></div>
        <div class="libro2" id="libro2" onclick="mostrarLibro2()"></div>
        <div class="libro3" id="libro3" onclick="mostrarLibro3()"></div>
        <div class="libro4" id="libro4" onclick="mostrarLibro4()"></div>
        <div class="libro5" id="libro5" onclick="mostrarLibro5()"></div>
        <div class="pistaLibro" id="pistaLibro"></div>
        <div class="comprobarPalabra" id="comprobarPalabra">Introduce la palabra escondida
            <input type="text" class="palabraSecreta" id="palabraSecreta"
                onkeypress="if(event.key == 'Enter') comprobarPalabra()">
            <!--Input en el que hay que introducir la palabra, si se pulsa el enter, va a la funcion comprobarPalabra-->
        </div>

        <!--Escena Archivo sonoro -- mantener el ratón 5 segundos sobre la partitura-->
        <div class="partitura" id="partitura" onmouseover="iniciarTemporizador()" onmouseout="cancelarTemporizador()">
        </div>

        <!--Escena Cámara Armónica -- pulsa en el centro para empezar quiz y acertar todas la preguntas para pasar a la siguiente escena-->
        <div class="empezarQuiz" id="empezarQuiz" onclick="preguntaQuiz()"></div> <!--Div para hacer click y empezar el Quiz-->
        <div class="quiz" id="quiz"> <!--Div del quiz-->
            <div class="preguntaQuiz" id="preguntaQuiz"> <!--Div pregunta-->
                <p class="pregunta" id="pregunta"></p>
            </div>
            <div class="respuestasQuiz" id="respuestasQuiz"> <!--Div respuestas-->
                <button class="respuesta1" id="respuesta1"></button>
                <button class="respuesta2" id="respuesta2"></button>
                <button class="respuesta3" id="respuesta3"></button>
                <button class="respuesta4" id="respuesta4"></button>
            </div>
        </div>

        <!--Sala Intérprete -- al afinar los 3 instrumentos, guitarra, violín y trompeta se pasa a la siguiente escena-->
        <div class="instrumento1" id="instrumento1" onclick="afinarInstrumento1()"></div>
        <div class="instrumento2" id="instrumento2" onclick="afinarInstrumento2()"></div>
        <div class="instrumento3" id="instrumento3" onclick="afinarInstrumento3()"></div>
        <input type="range" class="afinar" id="afinar">

        <!--Cámara Armónica -- al hacer click al final de la escena se pasa a la siguiente escena-->
        <div class="puertaArmonica" id="puertaArmonica" onclick="escena10()"></div>

        <!--Sala del tiempo -- simon dice-->
        <div class="tiempo" id="tiempo">
            <button class="boton0" id="boton0"></button>
            <button class="boton1" id="boton1"></button>
            <button class="boton2" id="boton2"></button>
            <button class="boton3" id="boton3"></button>
        </div>

        <!--Conflicto con el silencio -- al pulsar en el botón de Si se avanza a la siguiente escena-->
        <div class="decisionFinal" id="decisionFinal">
            <p>¿Quieres enfrentar al silencio?</p>
            <button class="botonBueno" id="botonBueno">NO</button>
            <button class="botonMalo" id="botonMalo">SI</button>
        </div>

        <!--Concierto final -- al hacer en orden la escala musical se pasa a la siguiente escena-->
        <div class="piano" id="piano" onclick="puzzlePiano()"></div>
        <div class="teclas" id="teclas">
            <div class="do" id="do"></div>
            <div class="re" id="re"></div>
            <div class="mi" id="mi"></div>
            <div class="fa" id="fa"></div>
            <div class="sol" id="sol"></div>
            <div class="la" id="la"></div>
            <div class="si" id="si"></div>
        </div>

        <div class="reiniciar" id="reiniciar" onclick="escena0()"></div>

    </main>
    <div class="narrador" id="narrador"></div>
    <div class="tituloMapa" id="tituloMapa"></div>
    <div class="vidas" id="vidas"></div>
    <div class="escenaAnterior" id="escenaAnterior">
        <p id="parrafoAnterior">Escena anterior</p>
        <div class="flechaAtras" id="flechaAtras"></div>
        <div class="imagenAtras" id="imagenAtras"></div>
    </div>

    <footer class="pie" id="mensaje">
        <p id="parrafo"></p>
    </footer>
</body>

</html>
